<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>J.A.R.V.I.S — Voice Assistant</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

:root {
  --gold: #c8a84b;
  --gold-glow: rgba(200,168,75,0.4);
  --blue: #00d4ff;
  --bg: #03080f;
  --green: #00ff88;
  --orange: #ff8800;
  --red: #ff4040;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Share Tech Mono', monospace;
  overflow: hidden;
  user-select: none;
}

/* Animated grid */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
  background-size: 50px 50px;
  animation: driftGrid 25s linear infinite;
  pointer-events: none;
  z-index: 0;
}
@keyframes driftGrid {
  from { background-position: 0 0; }
  to   { background-position: 50px 50px; }
}

/* Vignette */
body::after {
  content: '';
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,0.88) 100%);
  pointer-events: none;
  z-index: 0;
}

/* Corner brackets */
.corner { position: fixed; width: 50px; height: 50px; border-color: var(--gold); border-style: solid; opacity: 0.3; z-index: 1; }
.tl { top:14px; left:14px; border-width:2px 0 0 2px; }
.tr { top:14px; right:14px; border-width:2px 2px 0 0; }
.bl { bottom:14px; left:14px; border-width:0 0 2px 2px; }
.br { bottom:14px; right:14px; border-width:0 2px 2px 0; }

/* Main stage */
.stage {
  position: relative;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 26px;
}

/* Title */
.title h1 {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(2rem, 6vw, 3.2rem);
  font-weight: 900;
  letter-spacing: 0.45em;
  background: linear-gradient(135deg, #7a5c1e, var(--gold), #fff8dc, var(--gold), #7a5c1e);
  background-size: 300% 100%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: shimmer 4s ease-in-out infinite;
  filter: drop-shadow(0 0 10px var(--gold-glow));
  text-align: center;
}
@keyframes shimmer {
  0%,100% { background-position: 0% 50%; }
  50%      { background-position: 100% 50%; }
}
.title p {
  font-size: 0.58rem;
  color: rgba(200,168,75,0.45);
  letter-spacing: 0.55em;
  margin-top: 5px;
  text-align: center;
}

/* Arc Reactor Wrapper */
.arc-wrap {
  position: relative;
  width: 220px;
  height: 220px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Spinning rings */
.ring {
  position: absolute;
  border-radius: 50%;
  border-style: solid;
  animation: spin linear infinite;
}
.r1 { width:210px; height:210px; border:1.5px solid rgba(0,212,255,0.2);  animation-duration:12s; }
.r2 { width:178px; height:178px; border:1.5px dashed rgba(200,168,75,0.25); animation-duration:7s;  animation-direction:reverse; }
.r3 { width:150px; height:150px; border:1.5px solid rgba(0,212,255,0.3);  animation-duration:4s; }
.r4 { width:124px; height:124px; border:1.5px dotted rgba(200,168,75,0.2); animation-duration:9s;  animation-direction:reverse; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Core */
.arc-core {
  position: relative;
  z-index: 5;
  width: 104px;
  height: 104px;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.2s;
}
.arc-core:hover { transform: scale(1.06); }

/* Idle */
.arc-core.idle {
  background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.95) 0%, var(--blue) 28%, #003858 62%, #000d18 100%);
  box-shadow: 0 0 22px var(--blue), 0 0 55px rgba(0,212,255,0.28), inset 0 0 18px rgba(0,0,0,0.55);
}

/* Listening */
.arc-core.listening {
  background: radial-gradient(circle at 35% 35%, #fff 0%, var(--orange) 28%, #502500 62%, #0d0000 100%);
  box-shadow: 0 0 32px var(--orange), 0 0 70px rgba(255,136,0,0.35), inset 0 0 18px rgba(0,0,0,0.5);
  animation: listenPulse 0.7s ease-in-out infinite alternate;
}
@keyframes listenPulse {
  from { transform: scale(1); }
  to   { transform: scale(1.1); }
}
.arc-core.listening::before,
.arc-core.listening::after {
  content: '';
  position: absolute;
  border-radius: 50%;
  border: 2px solid rgba(255,136,0,0.45);
  animation: rippleOut 1.4s ease-out infinite;
}
.arc-core.listening::after { animation-delay: 0.7s; }
@keyframes rippleOut {
  from { width:104px; height:104px; opacity:0.8; }
  to   { width:220px; height:220px; opacity:0; }
}

/* Thinking */
.arc-core.thinking {
  background: radial-gradient(circle at 35% 35%, #fff 0%, #0088ff 28%, #002255 62%, #000d18 100%);
  box-shadow: 0 0 42px #0088ff, 0 0 90px rgba(0,136,255,0.35);
  animation: thinkPulse 1.1s ease-in-out infinite;
}
@keyframes thinkPulse {
  0%,100% { box-shadow: 0 0 42px #0088ff, 0 0 90px rgba(0,136,255,0.25); }
  50%      { box-shadow: 0 0 62px #00d4ff, 0 0 130px rgba(0,212,255,0.45); }
}

/* Speaking */
.arc-core.speaking {
  background: radial-gradient(circle at 35% 35%, #fff 0%, var(--green) 28%, #003522 62%, #000d08 100%);
  box-shadow: 0 0 36px var(--green), 0 0 75px rgba(0,255,136,0.32);
  animation: speakWave 0.42s ease-in-out infinite alternate;
}
@keyframes speakWave {
  from { transform: scale(1); box-shadow: 0 0 30px var(--green), 0 0 60px rgba(0,255,136,0.25); }
  to   { transform: scale(1.09); box-shadow: 0 0 56px var(--green), 0 0 115px rgba(0,255,136,0.45); }
}

/* Mic SVG */
.mic-svg { width:40px; height:40px; pointer-events:none; }

/* Sound bars */
.sound-bars {
  display: flex;
  align-items: center;
  gap: 5px;
  height: 44px;
  opacity: 0;
  transition: opacity 0.3s;
}
.sound-bars.active { opacity: 1; }
.bar {
  width: 4px;
  border-radius: 3px;
  background: var(--green);
  box-shadow: 0 0 6px var(--green);
  animation: barAnim ease-in-out infinite alternate;
}
.bar:nth-child(1){height:8px; animation-duration:.50s;}
.bar:nth-child(2){height:22px;animation-duration:.68s;animation-delay:.10s;}
.bar:nth-child(3){height:36px;animation-duration:.42s;animation-delay:.05s;}
.bar:nth-child(4){height:24px;animation-duration:.75s;animation-delay:.15s;}
.bar:nth-child(5){height:14px;animation-duration:.55s;animation-delay:.20s;}
.bar:nth-child(6){height:30px;animation-duration:.60s;animation-delay:.08s;}
.bar:nth-child(7){height:18px;animation-duration:.48s;animation-delay:.12s;}
@keyframes barAnim {
  from { transform: scaleY(0.25); }
  to   { transform: scaleY(1); }
}

/* Status */
.status-lbl {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.7rem;
  letter-spacing: 0.32em;
  color: var(--blue);
  text-align: center;
  min-height: 22px;
  text-shadow: 0 0 10px rgba(0,212,255,0.55);
  transition: color 0.3s, text-shadow 0.3s;
}
.status-lbl.orange { color: var(--orange); text-shadow: 0 0 10px rgba(255,136,0,0.55); }
.status-lbl.green  { color: var(--green);  text-shadow: 0 0 10px rgba(0,255,136,0.55); }
.status-lbl.red    { color: var(--red);    text-shadow: 0 0 10px rgba(255,64,64,0.55); }

/* Transcript box */
.transcript {
  width: clamp(260px, 78vw, 540px);
  min-height: 52px;
  padding: 12px 18px;
  background: rgba(0,18,36,0.65);
  border: 1px solid rgba(0,212,255,0.12);
  border-radius: 4px;
  font-size: 0.82rem;
  color: rgba(160,220,255,0.75);
  line-height: 1.65;
  text-align: center;
  display: none;
  box-shadow: inset 0 0 20px rgba(0,0,0,0.4);
  transition: all 0.3s;
}
.transcript.show      { display: block; }
.transcript.jarvis    { color: #90f0d8; border-color: rgba(0,255,136,0.18); }

/* Memory dots */
.mem-row {
  display: flex; gap: 7px; flex-wrap: wrap;
  justify-content: center; max-width: 480px;
  min-height: 14px;
}
.mdot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--gold);
  opacity: 0.5;
  box-shadow: 0 0 5px var(--gold-glow);
  animation: dotIn 0.4s ease;
}
@keyframes dotIn { from { opacity:0; transform:scale(0); } to { opacity:0.5; transform:scale(1); } }

/* Hint */
.hint {
  font-size: 0.6rem;
  color: rgba(200,168,75,0.3);
  letter-spacing: 0.25em;
  text-align: center;
}
</style>
</head>
<body>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="stage">

  <div class="title">
    <h1>J.A.R.V.I.S</h1>
    <p>JUST A RATHER VERY INTELLIGENT SYSTEM</p>
  </div>

  <div class="arc-wrap">
    <div class="ring r1"></div>
    <div class="ring r2"></div>
    <div class="ring r3"></div>
    <div class="ring r4"></div>
    <div class="arc-core idle" id="arcCore" onclick="coreClick()">
      <svg class="mic-svg" viewBox="0 0 40 40" fill="none">
        <rect x="14" y="5" width="12" height="18" rx="6" fill="white" opacity="0.92"/>
        <path d="M9 20c0 6.075 4.925 11 11 11s11-4.925 11-11" stroke="white" stroke-width="2.2" stroke-linecap="round" fill="none" opacity="0.92"/>
        <line x1="20" y1="31" x2="20" y2="37" stroke="white" stroke-width="2.2" stroke-linecap="round" opacity="0.92"/>
        <line x1="14" y1="37" x2="26" y2="37" stroke="white" stroke-width="2.2" stroke-linecap="round" opacity="0.92"/>
      </svg>
    </div>
  </div>

  <div class="sound-bars" id="soundBars">
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div>
  </div>

  <div class="status-lbl" id="statusLbl">CLICK TO ACTIVATE</div>

  <div class="transcript" id="transcript"></div>

  <div class="mem-row" id="memRow"></div>

  <div class="hint">CLICK ARC TO SPEAK &nbsp;·&nbsp; CLICK AGAIN WHILE SPEAKING TO INTERRUPT</div>

</div>

<script>
/* ═══════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════ */
let state = 'idle';          // idle | listening | thinking | speaking
let recognition  = null;
let selectedVoice = null;
let currentUtt   = null;
let chatHistory  = [];
let memory       = [];
let initialized  = false;
let interimText  = '';

const arcCore    = document.getElementById('arcCore');
const statusLbl  = document.getElementById('statusLbl');
const transcript = document.getElementById('transcript');
const soundBars  = document.getElementById('soundBars');
const memRow     = document.getElementById('memRow');

/* ═══════════════════════════════════════════════
   UI HELPERS
═══════════════════════════════════════════════ */
function setUI(s, label, cls='') {
  state = s;
  arcCore.className = 'arc-core ' + s;
  statusLbl.textContent = label;
  statusLbl.className = 'status-lbl ' + cls;
  soundBars.className = 'sound-bars' + (s === 'speaking' ? ' active' : '');
}

function showText(text, isJarvis=false) {
  transcript.textContent = text;
  transcript.className = 'transcript show' + (isJarvis ? ' jarvis' : '');
}

function hideText() { transcript.className = 'transcript'; }

function addMemDot(fact) {
  const d = document.createElement('div');
  d.className = 'mdot';
  d.title = fact;
  memRow.appendChild(d);
}

/* ═══════════════════════════════════════════════
   VOICE SELECTION — male Google voice
═══════════════════════════════════════════════ */
function pickVoice() {
  const all = speechSynthesis.getVoices();
  if (!all.length) return null;

  const order = [
    v => /google/i.test(v.name) && /uk|british/i.test(v.name),
    v => /google/i.test(v.name) && /en.gb/i.test(v.lang),
    v => /google/i.test(v.name) && /male/i.test(v.name),
    v => /google/i.test(v.name) && /en.us/i.test(v.lang) && !/female/i.test(v.name),
    v => /google/i.test(v.name) && /en/i.test(v.lang),
    v => /male/i.test(v.name) && /en/i.test(v.lang),
    v => /en.gb/i.test(v.lang) && !/female/i.test(v.name),
    v => /en/i.test(v.lang) && !/female/i.test(v.name),
    () => all[0]
  ];

  for (const fn of order) {
    const v = all.find(fn);
    if (v) return v;
  }
  return all[0];
}

function loadVoices() {
  return new Promise(resolve => {
    const go = () => {
      const v = pickVoice();
      if (v) { selectedVoice = v; resolve(v); }
    };
    if (speechSynthesis.getVoices().length) go();
    else speechSynthesis.addEventListener('voiceschanged', go, { once:true });
  });
}

/* ═══════════════════════════════════════════════
   SPEAK
═══════════════════════════════════════════════ */
function speak(text, onDone) {
  speechSynthesis.cancel();
  currentUtt = null;

  const clean = text
    .replace(/\*\*(.+?)\*\*/g,'$1').replace(/\*(.+?)\*/g,'$1')
    .replace(/#{1,6}\s/g,'').replace(/`+/g,'')
    .replace(/\[([^\]]+)\]\([^)]+\)/g,'$1')
    .replace(/\n{2,}/g,'. ').replace(/\n/g,' ')
    .trim();

  const utt = new SpeechSynthesisUtterance(clean);
  if (selectedVoice) utt.voice = selectedVoice;
  utt.rate   = 0.9;
  utt.pitch  = 0.85;
  utt.volume = 1.0;

  utt.onstart = () => {
    setUI('speaking','SPEAKING','green');
    showText(text, true);
  };
  utt.onend = () => {
    currentUtt = null;
    setUI('idle','CLICK TO SPEAK');
    hideText();
    if (onDone) onDone();
  };
  utt.onerror = () => {
    currentUtt = null;
    setUI('idle','CLICK TO SPEAK');
    hideText();
  };

  currentUtt = utt;

  // Chrome bug workaround: keep TTS alive
  speechSynthesis.speak(utt);
  const keepAlive = setInterval(() => {
    if (!speechSynthesis.speaking) { clearInterval(keepAlive); return; }
    speechSynthesis.pause();
    speechSynthesis.resume();
  }, 10000);
}

/* ═══════════════════════════════════════════════
   SPEECH RECOGNITION
═══════════════════════════════════════════════ */
function setupRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { setUI('idle','SPEECH NOT SUPPORTED','red'); return false; }

  recognition = new SR();
  recognition.lang = 'en-US';
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    setUI('listening','LISTENING...','orange');
    interimText = '';
    showText('Listening...');
  };

  recognition.onresult = e => {
    interimText = Array.from(e.results).map(r => r[0].transcript).join('');
    showText(interimText);
  };

  recognition.onend = () => {
    const said = interimText.trim();
    interimText = '';
    if (said.length > 1) {
      hideText();
      queryJarvis(said);
    } else {
      setUI('idle','CLICK TO SPEAK');
      hideText();
    }
  };

  recognition.onerror = e => {
    interimText = '';
    const msgs = {
      'not-allowed': ['MIC ACCESS DENIED — ALLOW MIC IN BROWSER', 'red'],
      'no-speech':   ['NOTHING HEARD — CLICK TO TRY AGAIN', ''],
      'network':     ['NETWORK ERROR','red'],
    };
    const [label, cls] = msgs[e.error] || ['ERROR — CLICK TO RETRY', ''];
    setUI('idle', label, cls);
    hideText();
  };

  return true;
}

function startListening() {
  if (!recognition) { if (!setupRecognition()) return; }
  try { recognition.start(); }
  catch(e) {
    try { recognition.stop(); } catch(_){}
    setTimeout(() => { try { recognition.start(); } catch(_){} }, 350);
  }
}

function stopListening() {
  try { recognition?.stop(); } catch(_){}
}

/* ═══════════════════════════════════════════════
   CORE CLICK HANDLER
═══════════════════════════════════════════════ */
function coreClick() {

  // First click: initialise and greet
  if (!initialized) {
    initialized = true;
    setUI('thinking','INITIALIZING...');
    loadVoices().then(() => {
      speak(
        "J.A.R.V.I.S online. Good day sir. I am fully operational. Click the arc reactor and speak — I will answer anything, search the web for real-time information, and remember what we discuss. Ready when you are.",
        () => setTimeout(() => startListening(), 400)
      );
    });
    return;
  }

  if (state === 'speaking') {
    speechSynthesis.cancel();
    hideText();
    setUI('idle','INTERRUPTED');
    setTimeout(() => startListening(), 400);
    return;
  }

  if (state === 'listening') {
    stopListening();
    return;
  }

  if (state === 'idle') {
    startListening();
    return;
  }
}

/* ═══════════════════════════════════════════════
   QUERY JARVIS (Claude API + web search)
═══════════════════════════════════════════════ */
async function queryJarvis(userText) {
  setUI('thinking','PROCESSING...');
  showText('You: "' + userText + '"');

  chatHistory.push({ role:'user', content: userText });
  if (chatHistory.length > 20) chatHistory = chatHistory.slice(-20);

  const systemPrompt = `You are J.A.R.V.I.S — Just A Rather Very Intelligent System, Tony Stark's personal AI. You speak exactly like Jarvis in the Iron Man films: calm, composed, British-inflected, dry wit, deeply intelligent, always professional. You address the user as "sir".

CRITICAL RULES — read carefully:
1. This is a VOICE assistant. Everything you say will be spoken aloud. No markdown ever. No asterisks, no bullet points, no dashes, no headers, no lists. Write exactly as you would speak.
2. Keep responses concise: 1 to 4 natural spoken sentences. Only longer if the user explicitly asks for detail.
3. For ANY question about current events, news, weather, sports, stock prices, exchange rates, who holds a position, recent releases, or anything time-sensitive — you MUST use the web_search tool. Do not guess. Search first, then answer.
4. You never say "I cannot browse" or "as an AI I don't have access". You DO have web search. Use it.
5. Sound human. Use contractions. Speak conversationally, not like a document.
6. If this conversation reveals a useful fact to remember (user's name, preference, task), add it on a new line at the very end ONLY as: MEMORY: <max 8 words>. Otherwise omit.

Session memory: ${memory.length ? memory.join('; ') : 'none yet'}.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,
        tools: [{ type:'web_search_20250305', name:'web_search' }],
        messages: chatHistory
      })
    });

    if (!res.ok) {
      const e = await res.json().catch(()=>({}));
      throw new Error(e?.error?.message || 'HTTP ' + res.status);
    }

    const data = await res.json();

    let reply = (data.content || [])
      .filter(b => b.type === 'text')
      .map(b => b.text)
      .join(' ')
      .trim();

    if (!reply) reply = "My apologies, sir — I seem to have lost my train of thought. Could you repeat that?";

    // Extract MEMORY tag
    const mem = reply.match(/\nMEMORY:\s*(.+)/i);
    if (mem) {
      const fact = mem[1].trim().slice(0, 70);
      if (fact) {
        memory.push(fact);
        if (memory.length > 12) memory.shift();
        addMemDot(fact);
      }
      reply = reply.replace(/\nMEMORY:.+/i,'').trim();
    }

    chatHistory.push({ role:'assistant', content: reply });

    speak(reply, () => {
      // Auto-listen again for hands-free conversation
      setTimeout(() => startListening(), 450);
    });

  } catch(err) {
    console.error(err);
    let errSpeech;
    if (err.message.includes('fetch') || err.message.includes('network')) {
      errSpeech = "I'm having trouble reaching my servers, sir. Please check your internet connection.";
    } else {
      errSpeech = "I encountered a system error, sir. " + err.message.slice(0,80) + ". Please try again.";
    }
    speak(errSpeech, () => setTimeout(() => startListening(), 450));
  }
}

/* ═══════════════════════════════════════════════
   INIT — preload voices
═══════════════════════════════════════════════ */
loadVoices();
setUI('idle','CLICK TO ACTIVATE');
</script>
</body>
</html>
